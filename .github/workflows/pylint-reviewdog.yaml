name: pylint-reviewdog
on: [pull_request]

jobs:
 pylint:
  name: runner / pylint
  runs-on: ubuntu-latest
  steps:
   - uses: actions/checkout@v4
   - uses: dciborow/action-pylint@0.0.4
     with:
       github_token: ${{ secrets.GITHUB_TOKEN }}
       reporter: github-pr-check
       level: error
       pylint_rc: '.pylintrc-reviewdog'
